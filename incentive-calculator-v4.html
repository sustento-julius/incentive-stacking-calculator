document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

var(--rfla-grey-300);\n  --border-strong:    var(--rfla-grey-500);\n  --border-brand:     var(--rfla-blue);\n\n  /* --- Semantic text -------------------------------------------------- */\n  --fg1:              var(--rfla-dark);     /* primary text */\n  --fg2:              var(--rfla-grey-700); /* secondary text */\n  --fg3:              var(--rfla-grey-500); /* tertiary / captions */\n  --fg-on-dark:       var(--rfla-white);\n  --fg-on-brand:      var(--rfla-white);\n  --fg-link:          var(--rfla-blue);\n  --fg-link-hover:    var(--rfla-blue-800);\n  --fg-accent:        var(--rfla-green-700);\n\n  /* --- Status (derived; not in brand book — use sparingly) ----------- */\n  --status-success:   var(--rfla-green-700);\n  --status-info:      var(--rfla-sky);\n  --status-warning:   #E0A030;\n  --status-danger:    #C8372D;\n\n  /* ===================================================================\n     TYPOGRAPHY\n     =================================================================== */\n  --font-headline:    \"Montserrat\", \"Gibson\", \"Avenir\", system-ui, sans-serif;\n  --font-body:        \"Avenir\", \"Lato\", system-ui, sans-serif;\n  --font-web:         \"Lato\", \"Avenir\", system-ui, sans-serif;\n  --font-mono:        ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* type scale (rem-based, 16px root) */\n  --fs-display: 4.5rem;   /* 72 */\n  --fs-h1:      3.0rem;   /* 48 */\n  --fs-h2:      2.25rem;  /* 36 */\n  --fs-h3:      1.5rem;   /* 24 */\n  --fs-h4:      1.25rem;  /* 20 */\n  --fs-body:    1.0rem;   /* 16 */\n  --fs-small:   0.875rem; /* 14 */\n  --fs-caption: 0.75rem;  /* 12 */\n\n  --lh-tight:   1.05;\n  --lh-snug:    1.2;\n  --lh-normal:  1.5;\n  --lh-loose:   1.7;\n\n  --tracking-display: -0.01em;\n  --tracking-eyebrow: 0.18em;   /* uppercase eyebrows / sublabels */\n  --tracking-body:    0;\n\n  /* ===================================================================\n     SPACING / RADIUS / SHADOW / MOTION\n     =================================================================== */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  --radius-sm: 4px;\n  --radius-md: 8px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-pill: 999px;\n\n  /* Soft, low-contrast shadows — Retrofit feels editorial, not \"techy\" */\n  --shadow-sm: 0 1px 2px rgba(2, 18, 48, 0.06);\n  --shadow-md: 0 4px 12px rgba(2, 18, 48, 0.08);\n  --shadow-lg: 0 12px 32px rgba(2, 18, 48, 0.12);\n  --shadow-focus: 0 0 0 3px rgba(29, 69, 154, 0.25);\n\n  --ease-standard: cubic-bezier(0.2, 0.8, 0.2, 1);\n  --ease-emphasized: cubic-bezier(0.2, 0.9, 0.1, 1);\n  --dur-fast: 150ms;\n  --dur-base: 220ms;\n  --dur-slow: 360ms;\n}\n\n\n/* ==========================================================================\n   SEMANTIC TYPE STYLES\n   ========================================================================== */\n\nhtml { font-family: var(--font-body); color: var(--fg1); background: var(--bg); }\nbody { font-family: var(--font-body); line-height: var(--lh-normal); }\n\n/* Headlines — Montserrat (Gibson substitute). Per guidelines, headlines may use\n   upper- and lower-case. Section eyebrows are uppercase + tracked. */\n\nh1, .h1 {\n  font-family: var(--font-headline);\n  font-weight: 700;\n  font-size: var(--fs-h1);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-display);\n  color: var(--rfla-blue);\n  margin: 0 0 var(--space-5);\n}\n\n.display {\n  font-family: var(--font-headline);\n  font-weight: 700;\n  font-size: var(--fs-display);\n  line-height: 0.95;\n  letter-spacing: -0.02em;\n  color: var(--rfla-blue);\n  text-transform: uppercase;   /* observed pattern: BETTER NEIGHBORHOOD, SAME NEIGHBORS */\n}\n\nh2, .h2 {\n  font-family: var(--font-headline);\n  font-weight: 600;\n  font-size: var(--fs-h2);\n  line-height: var(--lh-snug);\n  color: var(--rfla-blue);\n  margin: 0 0 var(--space-4);\n}\n\nh3, .h3 {\n  font-family: var(--font-headline);\n  font-weight: 600;\n  font-size: var(--fs-h3);\n  line-height: var(--lh-snug);\n  color: var(--fg1);\n  margin: 0 0 var(--space-3);\n}\n\nh4, .h4 {\n  font-family: var(--font-headline);\n  font-weight: 500;\n  font-size: var(--fs-h4);\n  line-height: var(--lh-snug);\n  color: var(--fg1);\n}\n\n/* Eyebrow / kicker — common above titles on retrofit.la */\n.eyebrow {\n  font-family: var(--font-headline);\n  font-weight: 600;\n  font-size: var(--fs-small);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--rfla-green-700);\n}\n\n/* Body — Avenir. Roman = 400; Heavy = 800 */\np, .p {\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-loose);\n  color: var(--fg1);\n  text-wrap: pretty;\n  margin: 0 0 var(--space-4);\n}\n\n.lede {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 1.25rem;\n  line-height: var(--lh-normal);\n  color: var(--fg2);\n}\n\nsmall, .caption {\n  font-size: var(--fs-caption);\n  line-height: var(--lh-normal);\n  color: var(--fg3);\n}\n\na {\n  color: var(--fg-link);\n  text-decoration: underline;\n  text-underline-offset: 0.18em;\n  text-decoration-thickness: 1.5px;\n  transition: color var(--dur-fast) var(--ease-standard);\n}\na:hover { color: var(--fg-link-hover); }\n\ncode, pre, .mono {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\n/* Selection */\n::selection { background: var(--rfla-light-green); color: var(--rfla-dark); }\n<\u002Fstyle>\n\n<style>\n/* ==========================================================================\n   Incentive Calculator — Retrofit LA\n   Grounded in tokens.css (colors, type, spacing, radii, shadows, motion).\n   ========================================================================== */\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml, body {\n  font-family: var(--font-body);\n  font-size: 16px;\n  color: var(--fg1);\n  background: var(--rfla-grey-050);\n  line-height: var(--lh-normal);\n  -webkit-font-smoothing: antialiased;\n}\n\na { color: var(--fg-link); text-decoration: none; }\na:hover { color: var(--fg-link-hover); }\n\nbutton { font-family: inherit; cursor: pointer; }\n\n/* ── BRAND NAV ────────────────────────────────────────────────────────────── */\n.nav {\n  background: var(--rfla-dark);\n  color: var(--fg-on-dark);\n  padding: var(--space-4) var(--space-6);\n  display: flex;\n  align-items: center;\n  gap: var(--space-5);\n}\n.nav-logo { height: 34px; width: auto; flex-shrink: 0; }\n.nav-eyebrow {\n  font-family: var(--font-headline);\n  font-size: var(--fs-caption);\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-eyebrow);\n  color: var(--rfla-green-500);\n  margin-bottom: 2px;\n}\n.nav-title {\n  font-family: var(--font-headline);\n  font-size: 1.05rem;\n  font-weight: 600;\n  color: var(--fg-on-dark);\n  letter-spacing: 0.01em;\n}\n.nav-meta {\n  margin-left: auto;\n  font-size: var(--fs-caption);\n  color: rgba(255,255,255,0.55);\n  text-align: right;\n  line-height: 1.4;\n}\n.nav-meta strong { color: var(--rfla-green-500); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }\n\n/* ── PAGE ─────────────────────────────────────────────────────────────────── */\n.page {\n  max-width: 1120px;\n  margin: 0 auto;\n  padding: var(--space-7) var(--space-5) var(--space-8);\n}\n\n/* ── ICONS ────────────────────────────────────────────────────────────────── */\n.icon { width: 1em; height: 1em; stroke: currentColor; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; fill: none; vertical-align: -0.15em; }\n.icon-lg { width: 1.4em; height: 1.4em; }\n@keyframes spin { to { transform: rotate(360deg); } }\n.icon-spin { animation: spin 0.9s linear infinite; }\n\n/* ── EYEBROW / SECTION LABEL ──────────────────────────────────────────────── */\n.eyebrow {\n  font-family: var(--font-headline);\n  font-size: var(--fs-caption);\n  font-weight: 600;\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--rfla-green-700);\n}\n.section-label {\n  display: flex;\n  align-items: center;\n  gap: var(--space-3);\n  font-family: var(--font-headline);\n  font-size: var(--fs-caption);\n  font-weight: 700;\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--rfla-blue);\n  margin-bottom: var(--space-4);\n}\n.section-label::after {\n  content: '';\n  flex: 1;\n  height: 1px;\n  background: var(--border);\n}\n.section-label.muted { color: var(--rfla-grey-500); }\n\n/* ── BUTTONS ──────────────────────────────────────────────────────────────── */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--space-2);\n  background: var(--rfla-blue);\n  color: var(--rfla-white);\n  border: 1px solid var(--rfla-blue);\n  border-radius: var(--radius-sm);\n  padding: 12px 22px;\n  font-family: var(--font-headline);\n  font-size: var(--fs-caption);\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  transition: background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard);\n}\n.btn:hover { background: var(--rfla-blue-800); border-color: var(--rfla-blue-800); }\n.btn:disabled { background: var(--rfla-grey-500); border-color: var(--rfla-grey-500); cursor: default; }\n.btn-secondary {\n  background: var(--rfla-green-600);\n  border-color: var(--rfla-green-600);\n  color: var(--rfla-white);\n}\n.btn-secondary:hover { background: var(--rfla-green-700); border-color: var(--rfla-green-700); }\n.btn-ghost {\n  background: transparent;\n  color: var(--rfla-blue);\n  border: 1px solid var(--rfla-blue);\n}\n.btn-ghost:hover { background: var(--rfla-blue); color: var(--rfla-white); }\n.btn-amber {\n  background: var(--status-warning);\n  border-color: var(--status-warning);\n  color: var(--rfla-white);\n}\n.btn-amber:hover { filter: brightness(0.92); }\n\n/* ── CARDS ────────────────────────────────────────────────────────────────── */\n.card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--radius-md);\n  padding: var(--space-5) var(--space-6);\n  margin-bottom: var(--space-4);\n  box-shadow: var(--shadow-sm);\n}\n\n/* ── ADDRESS CARD ─────────────────────────────────────────────────────────── */\n.address-card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-top: 4px solid var(--rfla-blue);\n  border-radius: var(--radius-md);\n  padding: var(--space-6);\n  margin-bottom: var(--space-4);\n  box-shadow: var(--shadow-md);\n}\n.address-card .eyebrow { display: block; margin-bottom: var(--space-2); }\n.address-card h2 {\n  font-family: var(--font-headline);\n  font-size: 1.75rem;\n  font-weight: 700;\n  color: var(--rfla-blue);\n  letter-spacing: -0.005em;\n  margin-bottom: var(--space-2);\n  line-height: var(--lh-snug);\n}\n.address-card .lede {\n  font-size: 0.95rem;\n  color: var(--fg2);\n  margin-bottom: var(--space-5);\n  max-width: 60ch;\n  line-height: var(--lh-normal);\n}\n.input-row { display: flex; gap: var(--space-2); }\n#address-input {\n  flex: 1;\n  border: 1.5px solid var(--border);\n  border-radius: var(--radius-sm);\n  padding: 13px 16px;\n  font-size: 0.95rem;\n  font-family: var(--font-body);\n  color: var(--fg1);\n  outline: none;\n  transition: border-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard);\n  background: var(--rfla-white);\n}\n#address-input:focus { border-color: var(--rfla-blue); box-shadow: var(--shadow-focus); }\n#address-input::placeholder { color: var(--rfla-grey-500); }\n\n/* ── STEP TICKER ──────────────────────────────────────────────────────────── */\n.ticker {\n  display: none;\n  align-items: center;\n  gap: var(--space-3);\n  margin-top: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  background: var(--rfla-blue-050);\n  border-radius: va iances','Smart Thermostats'],\n   contact:'glendalewaterandpower.com'},\n  {id:'pwp_rebates', name:'PWP Rebates + Solar', full:'Pasadena Water & Power + Solar Pilot',\n   admin:'PWP', terr:['pwp'], status:'active', gas:false, badge:false,\n   stackLo:15000, stackHi:40000, coverNote:'20–50% utility + solar pilot (April 2026)',\n   minUnits:1, eligNote:'Enhanced if income-qualified',\n   measures:['HP HVAC','Heat Pump Water Heater','Solar PV','Smart Thermostats'],\n   contact:'cityofpasadena.net/water'},\n  {id:'gswc_rebates', name:'Golden State Water Rebates', full:'Golden State Water Conservation Rebates',\n   admin:'GSWC', terr:['gswc'], status:'active', gas:false, badge:false,\n   stackLo:2000, stackHi:4000, coverNote:'$40–$250/toilet + fixtures',\n   minUnits:1, eligNote:'None — water-efficiency only',\n   measures:['Faucet Aerators'],\n   contact:'conservation@gswater.com'},\n  {id:'mahep', name:'MAHEP', full:'Multifamily Affordable Housing Electrification Program',\n   admin:'AEA / South Coast AQMD',\n   terr:['ladwp','sce','bwp','gwp','pwp','azusa','cerritos','lbud','gswc','other'],\n   status:'hold', gas:false, badge:false,\n   stackLo:30000, stackHi:70000, coverNote:'Up to $500K per project',\n   minUnits:5, eligNote:'DAC required + ≥66% ≤80% AMI',\n   measures:['HP HVAC','Heat Pump Water Heater','Induction Cooktop','Panel Upgrade','Appliances'],\n   holdNote:'On hold — accepting interest forms. Your FTA advisor will confirm current availability.',\n   contact:'MAHEP@aea.us.org'},\n  {id:'gozero', name:'GoZero', full:'AQMD Multifamily Pilot (GoZero)',\n   admin:'Willdan / AQMD',\n   terr:['ladwp','sce','bwp','gwp','pwp','azusa','cerritos','lbud','gswc','other'],\n   status:'paused', gas:false, badge:false,\n   stackLo:5000, stackHi:20000, coverNote:'HVAC $1K–$2K/unit · HPWH $1.4K–$2.1K/unit',\n   minUnits:1, eligNote:'75% of $5M reserved for overburdened communities',\n   measures:['HP HVAC','Heat Pump Water Heater'],\n   holdNote:'$5M pilot fully reserved — watch for next phase.',\n   contact:'GOZEROMultifamily@willdan.com'},\n  {id:'liwp', name:'LIWP', full:'Low Income Weatherization Program',\n   admin:'AEA / TRC / GRID Alternatives',\n   terr:['ladwp','sce','bwp','gwp','pwp','azusa','cerritos','lbud','gswc','other'],\n   status:'hold', gas:false, badge:false,\n   stackLo:50000, stackHi:100000, coverNote:'30–100% of EE costs; 50–100% of solar',\n   minUnits:1, eligNote:'Deed-restricted low-income housing',\n   measures:['HP HVAC','Heat Pump Water Heater','Solar PV','Weatherization','Windows/Insulation','Panel Upgrade'],\n   holdNote:'Wind-down — completing committed pipeline through June 2026.',\n   contact:'HOlsen@trccompanies.com'},\n];\n\n// ── HELPERS ───────────────────────────────────────────────────────────────────\n\nfunction fmt(n){\n  if(!n&&n!==0)return'—';\n  if(n>=1000000)return'$'+(n/1e6).toFixed(1)+'M';\n  if(n>=1000)return'$'+Math.round(n/1000)+'K';\n  return'$'+n.toLocaleString();\n}\nfunction fmtR(lo,hi){return fmt(lo)+'–'+fmt(hi)}\nfunction eHi(p,u){return Math.round(p.stackHi/20*u)}\nfunction eLo(p,u){return Math.round(p.stackLo/20*u)}\nfunction esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/\"/g,'&quot;').replace(/<\u002Fg,'&lt;')}\nfunction sleep(ms){return new Promise(r=>setTimeout(r,ms))}\nfunction hexRgba(hex,a){\n  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);\n  return `rgba(${r},${g},${b},${a})`;\n}\n\nfunction getEligible(util,units){\n  return PROGS.filter(p=>{\n    if(!p.terr.includes(util))return false;\n    if(units<(p.minUnits||1))return false;\n    return true;\n  });\n}\n\nconst STATUS_LBL={active:'Active',hold:'On Hold',paused:'Paused'};\n\n// ── STATE ─────────────────────────────────────────────────────────────────────\n\nlet lastGeo=null,lastParcel=null,lastDac=null,lastCouncil=null;\nlet currentUtil='other';\nlet legendFilter='all';\n\n// ── TICKER ───────────────────────────────────────────────────────────────────\n\nfunction showTicker(label,state){\n  const el=document.getElementById('ticker');\n  const icon=document.getElementById('ticker-icon');\n  const text=document.getElementById('ticker-text');\n  el.style.display='flex';\n  text.textContent=label;\n  icon.className='tick-icon '+state;\n  const iconMap={loading:'#i-loader',done:'#i-check',err:'#i-x'};\n  const spinCls=state==='loading'?' icon-spin':'';\n  icon.innerHTML=`<svg class=\"icon${spinCls}\"><use href=\"${iconMap[state]||'#i-loader'}\"/><\u002Fsvg>`;\n}\nfunction hideTicker(){document.getElementById('ticker').style.display='none'}\n\n// ── API CALLS ─────────────────────────────────────────────────────────────────\n\nasync function geocode(addr){\n  const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1&countrycodes=us&addressdetails=1`;\n  const res=await fetch(url,{headers:{'Accept-Language':'en-US,en'}});\n  const data=await res.json();\n  if(!data.length)throw Object.assign(new Error('Address not found — try including city and zip'),{step:'geo'});\n  const r=data[0];const a=r.address||{};\n  const city=(a.city||a.town||a.village||a.suburb||'').toLowerCase().trim();\n  return{lat:parseFloat(r.lat),lon:parseFloat(r.lon),display:r.display_name,city,raw:a};\n}\n\nasync function checkDAC(lat,lon){\n  const params=new URLSearchParams({\n    geometry:`${lon},${lat}`,geometryType:'esriGeometryPoint',inSR:'4326',\n    spatialRel:'esriSpatialRelIntersects',outFields:'tract,TractTXT,CIscore,CIscoreP',\n    returnGeometry:'false',f:'json'\n  });\n  const url=`https://services1.arcgis.com/PCHfdHz4GlDNAhBb/arcgis/rest/services/CalEnviroScreen_4_0_Results_/FeatureServer/0/query?${params}`;\n  const res=await fetch(url);const data=await res.json();\n  if(!data.features?.length)return{isDAC:null,score:null,percentile:null,tractTxt:null};\n  const a=data.features[0].attributes;\n  return{isDAC:a.CIscoreP!=null?a.CIscoreP>=75:null,score:a.CIscore,percentile:a.CIscoreP,tractTxt:a.TractTXT||String(a.tract)};\n}\n\nasync function getCouncilDistrict(lat,lon){\n  const params=new URLSearchParams({\n    geometry:`${lon},${lat}`,geometryType:'esriGeometryPoint',inSR:'4326',\n    spatialRel:'esriSpatialRelIntersects',outFields:'District,District_Name,NAME',\n    returnGeometry:'false',f:'json'\n  });\n  const url=`https://maps.lacity.org/lahub/rest/services/Boundaries/MapServer/13/query?${params}`;\n  const res=await fetch(url,{signal:AbortSignal.timeout(8000)});const data=await res.json();\n  if(!data.features?.length)return{district:null,councilMember:null,outsideLA:true};\n  const a=data.features[0].attributes;\n  return{district:a.District,councilMember:a.NAME||null,outsideLA:false};\n}\n\nasync function getParcelData(lat,lon,address){\n  try{\n    const upper=address.toUpperCase().replace(/,.*$/,'').trim();\n    const m=upper.match(/^(\\d+)\\s+(?:[NSEW]\\s+)?(.+)/);\n    if(!m)return{found:false};\n    const q=`${m[1]} ${m[2].split(/\\s+/).slice(0,2).join(' ')}`;\n    const res=await fetch(`https://portal.assessor.lacounty.gov/api/search?search=${encodeURIComponent(q)}`,{signal:AbortSignal.timeout(8000)});\n    const d=await res.json();const parcels=d.Parcels;\n    if(!parcels?.length)return{found:false};\n    const details=await Promise.all(parcels.slice(0,4).map(async p=>{\n      try{const r=await fetch(`https://portal.assessor.lacounty.gov/api/parceldetail?ain=${p.AIN}`,{signal:AbortSignal.timeout(8000)});const d2=await r.json();return d2.Parcel||null;}catch{return null;}\n    }));\n    const valid=details.filter(Boolean).filter(p=>p.Latitude&&p.Longitude);\n    const fallback=details.filter(Boolean)[0];\n    const best=valid.length?valid.reduce((acc,p)=>{const d=Math.hypot(p.Latitude-lat,p.Longitude-lon);return d<acc.d?{p,d}:acc},{p:valid[0],d:Infinity}).p:fallback;\n    if(!best)return{found:false};\n    return{found:true,apn:best.AIN||null,sqft:best.SqftMain||null,lotSqft:best.SqftLot||null,yearBuilt:best.YearBuilt||null,units:best.NumOfUnits??null,useType:best.UseType||null};\n  }catch{return{found:false};}\n}\n\n// ── MAIN RUNNER ───────────────────────────────────────────────────────────────\n\nasync function runLookup(){\n  const addr=document.getElementById('address-input').value.trim();\n  if(!addr)return;\n  const btn=document.getElementById('run-btn');\n  btn.disabled=true;\n  document.getElementById('result-panel').classList.remove('visible');\n\n  const lt=document.getElementById('lt-example');\n  const slot=document.getElementById('lt-bottom-slot');\n  if(lt&&slot&&lt.parentNode!==slot){\n    lt.removeAttribute('open');\n    slot.appendChild(lt);\n  }\n\n  try{\n    showTicker('Geocoding address','loading');\n    const t0=Date.now();\n    lastGeo=await geocode(addr);\n    const elapsed0=Date.now()-t0;\n    if(elapsed0<900)await sleep(900-elapsed0);\n    showTicker('Address geocoded','done');\n    await sleep(750);\n\n    showTicker('Checking DAC status','loading');\n    const t1=Date.now();\n    lastDac=await checkDAC(lastGeo.lat,lastGeo.lon);\n    const elapsed1=Date.now()-t1;\n    if(elapsed1<900)await sleep(900-elapsed1);\n    showTicker('DAC status confirmed','done');\n    await sleep(750);\n\n    showTicker('Detecting utility territory','loading');\n    const util=CITY_UTILITY[lastGeo.city]||null;\n    currentUtil=util||'other';\n    await sleep(1000);\n    showTicker('Utility territory detected','done');\n    await sleep(750);\n\n    showTicker('Loading property data','loading');\n    const t3=Date.now();\n    lastParcel=await getParcelData(lastGeo.lat,lastGeo.lon,addr);\n    const elapsed3=Date.now()-t3;\n    if(elapsed3<900)await sleep(900-elapsed3);\n    showTicker('Property data loaded','done');\n    await sleep(750);\n\n    showTicker('Finding council district','loading');\n    lastCouncil={district:null,councilMember:null,outsideLA:true};\n    try{\n      const t4=Date.now();\n      lastCouncil=await getCouncilDistrict(lastGeo.lat,lastGeo.lon);\n      const elapsed4=Date.now()-t4;\n      if(elapsed4<900)await sleep(900-elapsed4);\n    }catch{}\n    showTicker('Council district found','done');\n    await sleep(750);\n\n    hideTicker();\n    showResults(currentUtil);\n\n  }catch(err){\n    showTicker('Error: '+(err.message||'Unknown error'),'err');\n    await sleep(3000);\n    hideTicker();\n  }finally{\n    btn.disabled=false;\n  }\n}\n\n// ── SHOW RESULTS ──────────────────────────────────────────────────────────────\n\nfunction showResults(util){\n  const isDac=lastDac?.isDAC;\n  const p=lastParcel||{};\n  const g=lastGeo||{};\n\n  const card=document.getElementById('dac-card');\n  const circle=document.getElementById('dac-circle');\n  const heading=document.getElementById('dac-heading');\n  const sub=document.getElementById('dac-sub');\n  const pill=document.getElementById('dac-ces-pill');\n  card.className='card dac-badge-card rs in';\n  if(isDac===true){\n    card.classList.add('dac-yes');circle.innerHTML='<svg class=\"icon\"><use href=\"#i-check\"/><\u002Fsvg>';\n    heading.textContent='DAC — Yes';\n    sub.textContent='This property is in a Disadvantaged Community (CalEnviroScreen top 25%, SB 535). Full program stack unlocked.';\n  }else if(isDac===false){\n    card.classList.add('dac-no');circle.innerHTML='<svg class=\"icon\"><use href=\"#i-x\"/><\u002Fsvg>';\n    heading.textContent='DAC — No';\n    sub.textContent='This tract is not in the top 25% of CalEnviroScreen scores. Some DAC-exclusive programs may not apply.';\n  }else{\n    card.classList.add('dac-unk');circle.innerHTML='<svg class=\"icon\"><use href=\"#i-help\"/><\u002Fsvg>';\n    heading.textContent='DAC — Unconfirmed';\n    sub.textContent='CalEnviroScreen returned no data. Your FTA advisor will verify DAC status during your intake call.';\n  }\n  if(lastDac?.percentile!=null){\n    pill.textContent=`CES score ${lastDac.score?.toFixed(1)} · ${lastDac.percentile.toFixed(0)}th percentile`;\n    pill.style.display='block';\n  }\n\n  const utilSel=document.getElementById('param-utility');\n  utilSel.innerHTML=Object.entries(UTIL_LABELS).map(([k,v])=>`<option value=\"${k}\"${util===k?' selected':''}>${v}<\u002Foption>`).join('');\n  const detectedUnits=p.found&&p.units!=null?p.units:null;\n  document.getElementById('param-units').value=detectedUnits!==null?detectedUnits:'';\n  const hasDetected=detectedUnits!==null;\n  document.getElementById('units-source-note').style.display=hasDetected?'block':'none';\n  const banner=document.getElementById('units-banner');\n  if(hasDetected){\n    document.getElementById('units-detected-count').textContent=detectedUnits+' '+(detectedUnits===1?'unit':'units');\n    banner.style.display='block';\n  }else{\n    banner.style.display='none';\n  }\n\n  const enc=encodeURIComponent(document.getElementById('address-input').value);\n  document.getElementById('ql-zimas').href=`https://zimas.lacity.org/?addr=${enc}`;\n  if(p.apn)document.getElementById('ql-assessor').href=`https://portal.assessor.lacounty.gov/parceldetail/${p.apn}`;\n\n  const refs=[\n    {label:'Address', value:document.getElementById('address-input').value.trim()},\n    {label:'City / Utility', value:util?UTIL_LABELS[util]:(g.city?g.city.replace(/\\b\\w/g,c=>c.toUpperCase()):'—')},\n    {label:'Council District', value:lastCouncil?.outsideLA?'Outside LA City':lastCouncil?.district?`CD ${lastCouncil.district}`:'—'},\n    {label:'Council Member', value:!lastCouncil?.outsideLA&&lastCouncil?.councilMember?lastCouncil.councilMember:'—'},\n    {label:'# of Units', value:p.found&&p.units!=null?String(p.units):'—'},\n    {label:'17-Yr Units', value:'—'},\n    {label:'Year Built', value:p.found&&p.yearBuilt?String(p.yearBuilt):'—'},\n    {label:'Building Sq Ft', value:p.found&&p.sqft?Number(p.sqft).toLocaleString():'—'},\n    lastDac?.score!=null?{label:'CES Score', value:lastDac.score.toFixed(2)}:null,\n    lastDac?.percentile!=null?{label:'CES Percentile', value:lastDac.percentile.toFixed(1)+'th'}:null,\n    lastDac?.tractTxt?{label:'Census Tract', value:lastDac.tractTxt}:null,\n    p.apn?{label:'AIN (APN)', value:String(p.apn)}:null,\n    p.lotSqft?{label:'Lot Sq Ft', value:Number(p.lotSqft).toLocaleString()}:null,\n    p.useType?{label:'Use Type', value:p.useType}:null,\n    {label:'Lat / Lng', value:`${g.lat?.toFixed(5)}, ${g.lon?.toFixed(5)}`},\n  ].filter(Boolean);\n  document.getElementById('ref-grid').innerHTML=refs.map(r=>`\n    <div class=\"ref-item\"><div class=\"ri-label\">${r.label}<\u002Fdiv><div class=\"ri-value\">${esc(String(r.value))}<\u002Fdiv><\u002Fdiv>`).join('');\n\n  recalculate();\n\n  const SECTIONS=['dac-card','units-banner','sb-card','coverage-card','params-card','legend-card','matrix-section','quick-links','ref-section'];\n  SECTIONS.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('in')});\n\n  document.getElementById('result-panel').classList.add('visible');\n  // Smooth scroll into view without scrollIntoView shenanigans\n  const dacCard=document.getElementById('dac-card');\n  if(dacCard){\n    const y=dacCard.getBoundingClientRect().top+window.pageYOffset-20;\n    window.scrollTo({top:y,behavior:'smooth'});\n  }\n\n  const revealOrder=['dac-card','units-banner','sb-card','coverage-card','params-card','legend-card','matrix-section','quick-links','ref-section'];\n  revealOrder.forEach((id,i)=>{\n    setTimeout(()=>{\n      const el=document.getElementById(id);\n      if(el&&(id!=='units-banner'||el.style.display!=='none'))el.classList.add('in');\n    }, i*320);\n  });\n}\n\n// ── RECALCULATE ───────────────────────────────────────────────────────────────\n\nfunction recalculate(){\n  const util=document.getElementById('param-utility').value||'other';\n  const unitsRaw=parseInt(document.getElementById('param-units').value);\n  const units=isNaN(unitsRaw)||unitsRaw<1?20:unitsRaw;\n  const baseline=BASELINE*units;\n\n  const all=getEligible(util,units);\n  const active=all.filter(p=>p.status==='active'&&!p.badge);\n  const holdPaused=all.filter(p=>(p.status==='hold'||p.status==='paused'));\n  const stackable=active.filter(p=>p.stackHi>0);\n\n  const stkLo=stackable.reduce((s,p)=>s+eLo(p,units),0);\n  const stkHi=stackable.reduce((s,p)=>s+eHi(p,units),0);\n  const cvLo=Math.min(99,Math.round(stkLo/baseline*100));\n  const cvHi=Math.min(99,Math.round(stkHi/baseline*100));\n\n  const barAct=stackable.slice().sort((a,b)=>eHi(b,units)-eHi(a,units));\n  const barHold=holdPaused.filter(p=>p.stackHi>0).sort((a,b)=>eHi(b,units)-eHi(a,units));\n  document.getElementById('sb-inner').innerHTML=buildStackBar(barAct,barHold,baseline,units);\n  bindTips();\n\n  document.getElementById('coverage-pct').textContent=`${cvLo}–${cvHi}%`;\n  document.getElementById('coverage-sub').textContent=`of ~${fmt(baseline)} estimated project cost · ${units} ${units===1?'unit':'units'} · ${UTIL_LABELS[util]||util}`;\n  const actTotal=stackable.reduce((s,p)=>s+eHi(p,units),0);\n  const holdTotal=holdPaused.filter(p=>p.stackHi>0).reduce((s,p)=>s+eHi(p,units),0);\n  const gap=Math.max(0,baseline-actTotal);\n  document.getElementById('coverage-breakdown').innerHTML=`\n    <div><div class=\"cov-stat-lbl\">Active incentives<\u002Fdiv><div class=\"cov-stat-val\">${fmt(actTotal)}<\u002Fdiv><\u002Fdiv>\n    <div><div class=\"cov-stat-lbl\">Inc. on-hold programs<\u002Fdiv><div class=\"cov-stat-val\">${fmt(actTotal+holdTotal)}<\u002Fdiv><\u002Fdiv>\n    <div><div class=\"cov-stat-lbl\">Per unit (active)<\u002Fdiv><div class=\"cov-stat-val\">${fmt(Math.round(actTotal/units))}<\u002Fdiv><\u002Fdiv>\n    <div><div class=\"cov-stat-lbl\">Est. owner outlay<\u002Fdiv><div class=\"cov-stat-val\">${gap<1000?'~$0':fmt(gap)}<\u002Fdiv><\u002Fdiv>`;\n\n  const allForUtil=PROGS.filter(p=>p.terr.includes(util));\n  renderLegend(allForUtil,util,units);\n  renderMatrix(allForUtil.filter(p=>p.status==='active'),util);\n}\n\n// ── STACKED BAR ───────────────────────────────────────────────────────────────\n\nfunction buildStackBar(barAct,barHold,baseline,units){\n  const allSegs=[...barAct.map(p=>({...p,isHold:false})),...barHold.map(p=>({...p,isHold:true}))];\n  const actTotal=barAct.reduce((s,p)=>s+eHi(p,units),0);\n  const holdTotal=barHold.reduce((s,p)=>s+eHi(p,units),0);\n  const actPct=Math.min(100,actTotal/baseline*100);\n  const totPct=Math.min(100,(actTotal+holdTotal)/baseline*100);\n  let cum=0;const rendered=[];\n  for(const p of allSegs){\n    const raw=eHi(p,units)/baseline*100;\n    const w=Math.min(raw,100-cum);\n    if(w<0.5)break;\n    rendered.push({...p,w});cum+=w;\n  }\n  const gapPct=Math.max(0,100-cum);\n  function segBg(p){\n    const c=BAR_COLORS[p.id]||'#B2B2B2';\n    return p.isHold?`background:repeating-linear-gradient(45deg,${c},${c} 5px,${hexRgba(c,.35)} 5px,${hexRgba(c,.35)} 10px)`:`background:${c}`;\n  }\n  const showMark=totPct>actPct+2&&actPct>3&&actPct<97;\n\n  return`\n    <div class=\"sb-row-label\"><span>$0<\u002Fspan><span>${fmt(baseline)} project cost (100%)<\u002Fspan><\u002Fdiv>\n    <div class=\"sb-bar-outer\">\n      <div class=\"sb-bar\">\n        ${rendered.map(p=>`<div class=\"sb-seg\" style=\"width:${p.w.toFixed(2)}%;${segBg(p)}\"\n          data-tip=\"${esc(p.name+': ~'+fmtR(eLo(p,units),eHi(p,units))+(p.isHold?' (on hold/paused)':''))}\">\n          ${p.w>7?`<span class=\"sb-seg-lbl\">${BAR_ABBREV[p.id]||p.name.split(' ')[0]}<\u002Fspan>`:''}\n        <\u002Fdiv>`).join('')}\n        ${gapPct>0.5?`<div class=\"sb-gap\">${gapPct>10?`<span class=\"sb-gap-lbl\">~${fmt(Math.round(gapPct/100*baseline))} gap<\u002Fspan>`:''}<\u002Fdiv>`:''}\n      <\u002Fdiv>\n      ${showMark?`<div class=\"sb-marker\" style=\"left:${actPct.toFixed(1)}%\"><div class=\"sb-marker-lbl\">${Math.round(actPct)}% active<\u002Fdiv><\u002Fdiv>`:''}\n    <\u002Fdiv>\n    <div class=\"sb-stats\">\n      <div><div class=\"sb-stat-pct act\">${Math.round(actPct)}%<\u002Fdiv><div class=\"sb-stat-desc\">Active programs · ~${fmt(Math.max(0,baseline-actTotal))} owner outlay<\u002Fdiv><\u002Fdiv>\n      ${totPct>actPct+2?`<div><div class=\"sb-stat-pct pot\">${Math.round(totPct)}%<\u002Fdiv><div class=\"sb-stat-desc\">Including on-hold programs<\u002Fdiv><\u002Fdiv>`:''}\n      ${totPct>=99?`<div><div class=\"sb-stat-pct act\">~$0<\u002Fdiv><div class=\"sb-stat-desc\">Est. net owner outlay (full stack)<\u002Fdiv><\u002Fdiv>`:''}\n    <\u002Fdiv>`;\n}\n\n// ── PROGRAM LEGEND ────────────────────────────────────────────────────────────\n\nlet currentAll=[], currentUtil2='', currentUnits=20;\n\nfunction renderLegend(all,util,units){\n  currentAll=all;currentUtil2=util;currentUnits=units;\n  applyLegendFilter(legendFilter);\n}\n\nfunction filterLegend(f,btn){\n  legendFilter=f;\n  document.querySelectorAll('.legend-filter-btn').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  applyLegendFilter(f);\n}\n\nfunction applyLegendFilter(f){\n  const util=currentUtil2,units=currentUnits,all=currentAll;\n  let progs=all;\n  if(f==='electric') progs=all.filter(p=>!p.gas&&p.status!=='hold'&&p.status!=='paused');\n  else if(f==='solar') progs=all.filter(p=>p.measures&&p.measures.includes('Solar PV'));\n  else if(f==='gas') progs=all.filter(p=>p.gas);\n  else if(f==='hold') progs=all.filter(p=>p.status==='hold'||p.status==='paused');\n\n  const grid=document.getElementById('prog-legend-grid');\n  grid.innerHTML=progs.map(p=>{\n    const color=BAR_COLORS[p.id]||'#B2B2B2';\n    const hi=eHi(p,units),lo=eLo(p,units);\n    const measures=(p.measures||[]).slice(0,6);\n    const amtStr=p.badge?p.badgeText:(p.stackHi?fmtR(lo,hi):(p.coverNote||'—'));\n    const unitStr=p.badge?'':(p.stackHi?`${fmt(Math.round(lo/units))}–${fmt(Math.round(hi/units))}/unit`:(p.coverNote||''));\n    return`<div class=\"plc status-${p.status}\" style=\"border-left-color:${color}\">\n      <div class=\"plc-header\">\n        <div>\n          <div class=\"plc-name\">${esc(p.name)}<\u002Fdiv>\n          <div class=\"plc-full\">${esc(p.full)}<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"plc-badge ${p.status}\">${STATUS_LBL[p.status]}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"plc-amt\" style=\"color:${color}\">${amtStr}<\u002Fdiv>\n      <div class=\"plc-unit\">${esc(unitStr)}${p.holdNote?` &middot; <em>${esc(p.holdNote)}<\u002Fem>`:''}<\u002Fdiv>\n      ${measures.length?`\n      <div class=\"plc-measures-label\">Eligible Measures<\u002Fdiv>\n      <div class=\"plc-measures\">${measures.map(m=>{\n        const mc=M_CHIPS[m]||{label:m,cls:'m-appliances'};\n        return`<span class=\"m-chip ${mc.cls}\">${mc.label}<\u002Fspan>`;\n      }).join('')}<\u002Fdiv>`:''}\n      <div class=\"plc-foot\">${esc(p.admin)} &middot; ${esc(p.contact||'')}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n// ── MEASURE MATRIX ────────────────────────────────────────────────────────────\n\nconst MATRIX_MEASURES=[\n  'HP HVAC','Heat Pump Water Heater','Solar PV','Battery Storage',\n  'Induction Cooktop','Panel Upgrade','EV Charger Ready',\n  'Weatherization','Windows/Insulation','LED Lighting','Smart Thermostats','Appliances'\n];\n\nfunction renderMatrix(active,util){\n  const progs=active.filter(p=>p.measures&&p.measures.length);\n  const usedMeasures=MATRIX_MEASURES.filter(m=>progs.some(p=>p.measures.includes(m)));\n\n  const table=document.getElementById('matrix-table');\n  const hdr=`<thead><tr>\n    <th class=\"measure-col\">Upgrade / Measure<\u002Fth>\n    ${progs.map(p=>`<th title=\"${esc(p.full)}\" style=\"color:${BAR_COLORS[p.id]||'#888'}\">${BAR_ABBREV[p.id]||p.name.split(' ')[0]}<\u002Fth>`).join('')}\n    <th style=\"background:#F7F7F7;color:#B2B2B2\"># Programs<\u002Fth>\n  <\u002Ftr><\u002Fthead>`;\n\n  const rows=usedMeasures.map(m=>{\n    const mc=M_CHIPS[m]||{label:m,cls:'m-appliances'};\n    const coverage=progs.map(p=>p.measures.includes(m));\n    const count=coverage.filter(Boolean).length;\n    return`<tr>\n      <td class=\"measure-name\"><span class=\"m-chip ${mc.cls}\">${mc.label}<\u002Fspan><\u002Ftd>\n      ${coverage.map(c=>c?`<td><div class=\"matrix-check\"><svg class=\"icon\"><use href=\"#i-check\"/><\u002Fsvg><\u002Fdiv><\u002Ftd>`:`<td><\u002Ftd>`).join('')}\n      <td><span class=\"matrix-count ${count>1?'multi':'single'}\">${count}<\u002Fspan><\u002Ftd>\n    <\u002Ftr>`;\n  }).join('');\n\n  table.innerHTML=hdr+`<tbody>${rows}<\u002Ftbody>`;\n}\n\n// ── TOOLTIPS ──────────────────────────────────────────────────────────────────\n\nfunction bindTips(){\n  const tip=document.getElementById('tip');\n  document.querySelectorAll('[data-tip]').forEach(el=>{\n    el.addEventListener('mouseenter',e=>{tip.textContent=el.getAttribute('data-tip');tip.style.display='block';move(e)});\n    el.addEventListener('mousemove',move);\n    el.addEventListener('mouseleave',()=>{tip.style.display='none'});\n  });\n  function move(e){tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-30)+'px'}\n}\n\n// ── INIT ──────────────────────────────────────────────────────────────────────\n\nfunction focusUnits(){\n  const el=document.getElementById('param-units');\n  const card=document.getElementById('params-card');\n  const y=card.getBoundingClientRect().top+window.pageYOffset-20;\n  window.scrollTo({top:y,behavior:'smooth'});\n  setTimeout(()=>{el.focus();el.select();},400);\n}\n\ndocument.getElementById('address-input').addEventListener('keydown',e=>{if(e.key==='Enter')runLookup()});\n\nconst utilSel=document.getElementById('param-utility');\nutilSel.innerHTML=Object.entries(UTIL_LABELS).map(([k,v])=>`<option value=\"${k}\">${v}<\u002Foption>`).join('');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
